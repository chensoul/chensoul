name: fetch running

on:
  workflow_dispatch:
  schedule:
    - cron: "0 21 * * *"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download running.json
        run: |
          mkdir -p data
          curl -fsSL "https://raw.githubusercontent.com/chensoul/running_page/master/assets/running.json" -o data/running.json

      - name: Commit and push if changed
        run: |-
          git pull
          git diff
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -A
          git commit -m "fetch running data" || exit 0
          git push
