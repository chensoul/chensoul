name: WakaTime Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          API_BASE_URL: https://wakatime.com/api
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_TOKEN }}
          BLOCKS: "⬜🟨🟩"
          TIME_RANGE: last_7_days

