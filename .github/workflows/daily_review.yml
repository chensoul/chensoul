name: daily review

on:
  workflow_dispatch:
  schedule:
    # 每日 5:50 上海时间（cron 为 UTC，5:50 Asia/Shanghai = 21:50 前一日 UTC）
    - cron: "50 21 * * *"

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send briefing to Telegram
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WAKATIME_TOKEN: ${{ secrets.WAKATIME_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python3 daily_review.py | python3 send_daily_to_telegram.py

      - name: Commit and push if changed
        run: |-
          git pull
          git diff
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add -A
          git commit -m "chore: Send briefing to Telegram" || exit 0
          git push
